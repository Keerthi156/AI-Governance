name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Compile Python packages
        run: python -m compileall app
      - name: Import application
        env:
          DATABASE_URL: postgresql+psycopg2://ai_governance:ai_governance_dev@127.0.0.1:5432/ai_governance
          JWT_SECRET_KEY: ci-test-secret
        run: python -c "from app.main import app; print(app.title)"

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
        run: npm run build

  docker:
    name: Docker compose config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose file
        run: docker compose -f docker-compose.yml config
      - name: Build images
        run: |
          docker compose build backend frontend
        env:
          JWT_SECRET_KEY: ci-docker-secret
