# Render Blueprint — https://render.com/docs/blueprint-spec
# Portfolio deploy: FastAPI backend → Render; pair with Neon DB + Vercel frontend.
#
# IMPORTANT — Start Command must migrate before Uvicorn.
# If you created the service manually (not from this Blueprint), set Start Command in
# the Render Dashboard to the same startCommand below, then Manual Deploy.
#
# After connect:
# 1. Set secret env vars (DATABASE_URL, JWT_SECRET_KEY, CORS_ORIGINS, …).
# 2. Deploy / sync Blueprint.
# 3. Point Vercel NEXT_PUBLIC_API_BASE_URL at this service URL.
# 4. Set CORS_ORIGINS to your Vercel origin(s).

services:
  - type: web
    name: ai-governance-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    # Inline migrate+serve so tables exist even if the shell script is skipped.
    # start-prod.sh is equivalent and preferred when using the script path.
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: API_V1_PREFIX
        value: /api/v1
      - key: PYTHON_VERSION
        value: "3.12.8"
      # Set these in the Render dashboard (do not commit real values).
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: CREDENTIAL_ENCRYPTION_KEY
        sync: false
