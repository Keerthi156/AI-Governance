# Root compose stack: Postgres + FastAPI + Next.js
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: ai_governance_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ai_governance
      POSTGRES_PASSWORD: ai_governance_dev
      POSTGRES_DB: ai_governance
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_governance -d ai_governance"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_governance_backend
    restart: unless-stopped
    environment:
      APP_ENV: docker
      DEBUG: "false"
      DATABASE_URL: postgresql+psycopg2://ai_governance:ai_governance_dev@db:5432/ai_governance
      CORS_ORIGINS: http://localhost:3000
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-docker-dev-change-me}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    container_name: ai_governance_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
